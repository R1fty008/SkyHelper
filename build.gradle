plugins {
    id 'fabric-loom' version '1.13.6'
    id 'java'
}

version = '1.0.0'
group = 'com.skyhelper'

base {
    archivesName = 'SkyHelper'
}

repositories {
    mavenCentral()
}

loom {
    accessWidenerPath = file("src/main/resources/skyhelper.accesswidener")
}

dependencies {
    minecraft "com.mojang:minecraft:1.21.10"
    mappings loom.officialMojangMappings()
    modImplementation "net.fabricmc:fabric-loader:0.18.5"
    modImplementation "net.fabricmc.fabric-api:fabric-api:0.138.4+1.21.10"
}

java {
    sourceCompatibility = JavaVersion.VERSION_21
    targetCompatibility = JavaVersion.VERSION_21
}

tasks.withType(JavaCompile).configureEach {
    options.release = 21
}
